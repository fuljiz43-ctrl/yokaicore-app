name: CI
on:
  push:
    branches:
      - master
    tags:
      - v*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build app
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v1

      - name: Setup Android SDK
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "build-tools;29.0.3"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: adopt

      - name: Decode keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > ${{ github.workspace }}/app/yokaicore.jks
          keytool -list -keystore ${{ github.workspace }}/app/yokaicore.jks -storepass ${{ secrets.KEY_STORE_PASSWORD }} -alias ${{ secrets.ALIAS }}

      - name: Build app and run unit tests
        uses: gradle/gradle-command-action@v2
        env:
          SIGNING_STORE_PATH: ${{ github.workspace }}/app/yokaicore.jks
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        with:
          arguments: assembleStandardRelease --info

      # Sign APK and create release for tags

      - name: Get tag name
        if: startsWith(github.ref, 'refs/tags/') && github.repository == 'fuljiz43-ctrl/yokaicore-app'
        run: |
          set -x
          echo "VERSION_TAG=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV

      - name: Sign APK
        if: startsWith(github.ref, 'refs/tags/') && github.repository == 'fuljiz43-ctrl/yokaicore-app'
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/standard/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Clean up build artifacts
        if: startsWith(github.ref, 'refs/tags/') && github.repository == 'fuljiz43-ctrl/yokaicore-app'
        run: |
          set -e

          mv app/build/outputs/apk/standard/release/app-standard-universal-release-signed.apk yokaicore-${{ env.VERSION_TAG }}.apk 2>/dev/null || mv app/build/outputs/apk/standard/release/app-standard-universal-release-unsigned-signed.apk yokaicore-${{ env.VERSION_TAG }}.apk
          sha=`sha256sum yokaicore-${{ env.VERSION_TAG }}.apk | awk '{ print $1 }'`
          echo "APK_UNIVERSAL_SHA=$sha" >> $GITHUB_ENV

          cp app/build/outputs/apk/standard/release/app-standard-arm64-v8a-release-signed.apk yokaicore-arm64-v8a-${{ env.VERSION_TAG }}.apk 2>/dev/null || cp app/build/outputs/apk/standard/release/app-standard-arm64-v8a-release-unsigned-signed.apk yokaicore-arm64-v8a-${{ env.VERSION_TAG }}.apk
          sha=`sha256sum yokaicore-arm64-v8a-${{ env.VERSION_TAG }}.apk | awk '{ print $1 }'`
          echo "APK_ARM64_V8A_SHA=$sha" >> $GITHUB_ENV

          cp app/build/outputs/apk/standard/release/app-standard-armeabi-v7a-release-signed.apk yokaicore-armeabi-v7a-${{ env.VERSION_TAG }}.apk 2>/dev/null || cp app/build/outputs/apk/standard/release/app-standard-armeabi-v7a-release-unsigned-signed.apk yokaicore-armeabi-v7a-${{ env.VERSION_TAG }}.apk
          sha=`sha256sum yokaicore-armeabi-v7a-${{ env.VERSION_TAG }}.apk | awk '{ print $1 }'`
          echo "APK_ARMEABI_V7A_SHA=$sha" >> $GITHUB_ENV

          cp app/build/outputs/apk/standard/release/app-standard-x86-release-unsigned-signed.apk yokaicore-x86-${{ env.VERSION_TAG }}.apk
          sha=`sha256sum yokaicore-x86-${{ env.VERSION_TAG }}.apk | awk '{ print $1 }'`
          echo "APK_X86_SHA=$sha" >> $GITHUB_ENV
          
          cp app/build/outputs/apk/standard/release/app-standard-x86_64-release-unsigned-signed.apk yokaicore-x86_64-${{ env.VERSION_TAG }}.apk
          sha=`sha256sum yokaicore-x86_64-${{ env.VERSION_TAG }}.apk | awk '{ print $1 }'`
          echo "APK_X86_64_SHA=$sha" >> $GITHUB_ENV

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') && github.repository == 'fuljiz43-ctrl/yokaicore-app'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: YokaiCore ${{ env.VERSION_TAG }}
          body: |
            ---

            ### Checksums

            | Variant | SHA-256 |
            | ------- | ------- |
            | Universal | ${{ env.APK_UNIVERSAL_SHA }}
            | arm64-v8a | ${{ env.APK_ARM64_V8A_SHA }}
            | armeabi-v7a | ${{ env.APK_ARMEABI_V7A_SHA }}
            | x86 | ${{ env.APK_X86_SHA }} |
            | x86_64 | ${{ env.APK_X86_64_SHA }} |
          files: |
            yokaicore-${{ env.VERSION_TAG }}.apk
            yokaicore-arm64-v8a-${{ env.VERSION_TAG }}.apk
            yokaicore-armeabi-v7a-${{ env.VERSION_TAG }}.apk
            yokaicore-x86-${{ env.VERSION_TAG }}.apk
            yokaicore-x86_64-${{ env.VERSION_TAG }}.apk
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-website:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && github.repository == 'fuljiz43-ctrl/yokaicore-app'
    steps:
      - name: Trigger Netlify build hook
        run: curl -s -X POST -d {} "https://api.netlify.com/build_hooks/${TOKEN}"
        env:
          TOKEN: ${{ secrets.NETLIFY_HOOK_RELEASE }}
